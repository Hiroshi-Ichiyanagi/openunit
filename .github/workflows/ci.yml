name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        exclude:
          # macOS runners no longer ship CPython 3.8/3.9 for arm64.
          - os: macos-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Determinism guard (standalone, no dependencies)
        shell: bash
        run: python test_determinism_guard.py

      - name: Vintages reproduce byte-for-byte
        shell: bash
        run: python make_vintages.py --verify

      - name: Standalone test suites (no pytest)
        shell: bash
        run: |
          python test_vintages.py
          python test_ppp.py
          python test_cli.py
          python test_anchor.py

      - name: Install dev extras and run pytest
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest -q

      - name: Demo (sanity)
        shell: bash
        run: python openunit.py
